name: Trigger Deploy

on:
  push:
    branches:
      - main
      - develop

jobs:
  trigger-deploy:
    runs-on: ubuntu-latest
    env:
      DEPLOY_REPO: britobrunodev/forgame-deploy
      FRONTEND_DEPLOY_EVENT: deploy-frontend
      FRONTEND_DEPLOY_SERVICE: ${{ github.ref_name == 'develop' && 'forgame-frontend-dev' || 'forgame-frontend' }}
      BACKEND_DEPLOY_EVENT: deploy-backend
      BACKEND_DEPLOY_SERVICE: ${{ github.ref_name == 'develop' && 'forgame-backend-dev' || 'forgame-backend' }}

    steps:
      - name: Trigger frontend deploy repo workflow
        run: |
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_REPO_TOKEN }}" \
            https://api.github.com/repos/${{ env.DEPLOY_REPO }}/dispatches \
            -d '{
              "event_type": "${{ env.FRONTEND_DEPLOY_EVENT }}",
              "client_payload": {
                "service": "${{ env.FRONTEND_DEPLOY_SERVICE }}"
              }
            }'

      - name: Trigger backend deploy repo workflow
        run: |
          curl --fail -X POST \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer ${{ secrets.DEPLOY_REPO_TOKEN }}" \
            https://api.github.com/repos/${{ env.DEPLOY_REPO }}/dispatches \
            -d '{
              "event_type": "${{ env.BACKEND_DEPLOY_EVENT }}",
              "client_payload": {
                "service": "${{ env.BACKEND_DEPLOY_SERVICE }}"
              }
            }'
